const grid = document.getElementById("grid");
const modal = document.getElementById("modal");

function openDay(i){

  const d = days[i];

  document.getElementById("title").innerText =
    d.emoji + " " + d.title;

  document.getElementById("summary").innerText =
    d.summary;

  document.getElementById("lodging").innerText =
    d.lodging;

  const list = document.getElementById("itinerary");

  list.innerHTML = "";

  d.itinerary.forEach(t=>{

    const li = document.createElement("li");

    // SOPORTE PARA **NEGRITAS**
    li.innerHTML =
      "• " + t.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");

    list.appendChild(li);

  });

  modal.classList.remove("hidden");
  modal.classList.add("flex");

}

function closeModal(){

  modal.classList.add("hidden");
  modal.classList.remove("flex");

}

// CERRAR HACIENDO CLICK FUERA DEL MODAL
modal.addEventListener("click", (e) => {

  if(e.target === modal){

    closeModal();

  }

});

days.forEach((d,i)=>{

  const card = document.createElement("div");

  card.className =
    "bg-orange-100 p-4 rounded-xl cursor-pointer hover:scale-[1.02] transition";

  card.innerHTML = `
    <div class="flex justify-between">
      <span class="text-2xl">${d.emoji}</span>
      <span>🚗 ${d.distanceKm} km</span>
    </div>

    <h3 class="font-bold">${d.day} — ${d.title}</h3>

    <p class="text-sm">${d.summary}</p>
  `;

  card.onclick = ()=>openDay(i);

  grid.appendChild(card);

});
